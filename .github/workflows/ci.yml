name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            frontend/package-lock.json

      - name: Install worker dependencies
        run: npm ci --prefix worker

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Security audit (worker prod deps)
        run: |
          set -euo pipefail
          npm --prefix worker audit --omit=dev --audit-level=high

      - name: Security audit (frontend prod deps)
        run: |
          set -euo pipefail
          npm --prefix frontend audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Worker bundle dry-run
        working-directory: "worker"
        run: |
          set -euo pipefail
          npx wrangler deploy --dry-run
          npx wrangler deploy --config wrangler.full.toml --dry-run

      - name: Format check (non-blocking)
        continue-on-error: true
        run: npm run format:check
