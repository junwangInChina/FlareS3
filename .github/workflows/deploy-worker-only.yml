name: Controlled Full-Stack Release
on:
  workflow_dispatch:
    inputs:
      promote_to_production:
        description: "Run production approval and deploy after staging smoke passes"
        required: true
        default: false
        type: boolean

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            frontend/package-lock.json

      - name: Install worker dependencies
        working-directory: "worker"
        run: npm ci

      - name: Install frontend dependencies
        working-directory: "frontend"
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Package frontend dist
        run: tar -C "frontend" -czf "frontend-dist.tgz" "dist"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tgz
          if-no-files-found: error
          retention-days: 7

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: release-full-stack-staging
      cancel-in-progress: false
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_WORKER_NAME: ${{ vars.WORKER_NAME }}
      DEPLOY_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      DEPLOY_SMOKE_URL: ${{ vars.SMOKE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            frontend/package-lock.json

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .

      - name: Restore frontend dist
        run: |
          rm -rf "frontend/dist"
          tar -xzf "frontend-dist.tgz" -C "frontend"

      - name: Validate staging deploy configuration
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing required GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing required GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "${DEPLOY_WORKER_NAME}" ]; then
            echo "Missing required GitHub environment variable: WORKER_NAME"
            exit 1
          fi
          if [ -z "${DEPLOY_DATABASE_NAME}" ]; then
            echo "Missing required GitHub environment variable: D1_DATABASE_NAME"
            exit 1
          fi
          if [ -z "${DEPLOY_SMOKE_URL}" ]; then
            echo "Missing required GitHub environment variable: SMOKE_URL"
            exit 1
          fi

      - name: Install worker dependencies
        working-directory: "worker"
        run: npm ci

      - name: Prepare Wrangler CI config
        working-directory: "worker"
        run: |
          bash "./scripts/prepare-wrangler-ci-config.sh" \
            --base-config "wrangler.full.toml" \
            --output-config "wrangler.full.ci.toml" \
            --worker-name "${DEPLOY_WORKER_NAME}" \
            --database-name "${DEPLOY_DATABASE_NAME}"
          echo "WRANGLER_CI_CONFIG=wrangler.full.ci.toml" >> "${GITHUB_ENV}"

      - name: Verify R2_MASTER_KEY secret exists
        working-directory: "worker"
        run: bash "./scripts/verify-worker-secret.sh" --config "${WRANGLER_CI_CONFIG}" --worker-name "${DEPLOY_WORKER_NAME}"

      - name: Reconcile legacy D1 columns
        working-directory: "worker"
        run: node "./scripts/reconcile-legacy-d1-columns.mjs" --config "${WRANGLER_CI_CONFIG}" --database "DB" --remote

      - name: Apply D1 migrations
        working-directory: "worker"
        run: npx wrangler --config "${WRANGLER_CI_CONFIG}" d1 migrations apply "DB" --remote

      - name: Deploy Worker (full-stack)
        working-directory: "worker"
        run: npx wrangler --config "${WRANGLER_CI_CONFIG}" deploy

  smoke-staging:
    if: github.ref == 'refs/heads/main'
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    env:
      DEPLOY_SMOKE_URL: ${{ vars.SMOKE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate staging smoke configuration
        run: |
          if [ -z "${DEPLOY_SMOKE_URL}" ]; then
            echo "Missing required GitHub environment variable: SMOKE_URL"
            exit 1
          fi

      - name: Run staging smoke check
        working-directory: "worker"
        run: bash "./scripts/smoke-check.sh" "${DEPLOY_SMOKE_URL}" "staging"

  deploy-production:
    if: github.ref == 'refs/heads/main' && inputs.promote_to_production
    needs: smoke-staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: release-full-stack-production
      cancel-in-progress: false
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_WORKER_NAME: ${{ vars.WORKER_NAME }}
      DEPLOY_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      DEPLOY_SMOKE_URL: ${{ vars.SMOKE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            frontend/package-lock.json

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: .

      - name: Restore frontend dist
        run: |
          rm -rf "frontend/dist"
          tar -xzf "frontend-dist.tgz" -C "frontend"

      - name: Validate production deploy configuration
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing required GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing required GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "${DEPLOY_WORKER_NAME}" ]; then
            echo "Missing required GitHub environment variable: WORKER_NAME"
            exit 1
          fi
          if [ -z "${DEPLOY_DATABASE_NAME}" ]; then
            echo "Missing required GitHub environment variable: D1_DATABASE_NAME"
            exit 1
          fi
          if [ -z "${DEPLOY_SMOKE_URL}" ]; then
            echo "Missing required GitHub environment variable: SMOKE_URL"
            exit 1
          fi

      - name: Install worker dependencies
        working-directory: "worker"
        run: npm ci

      - name: Prepare Wrangler CI config
        working-directory: "worker"
        run: |
          bash "./scripts/prepare-wrangler-ci-config.sh" \
            --base-config "wrangler.full.toml" \
            --output-config "wrangler.full.ci.toml" \
            --worker-name "${DEPLOY_WORKER_NAME}" \
            --database-name "${DEPLOY_DATABASE_NAME}"
          echo "WRANGLER_CI_CONFIG=wrangler.full.ci.toml" >> "${GITHUB_ENV}"

      - name: Verify R2_MASTER_KEY secret exists
        working-directory: "worker"
        run: bash "./scripts/verify-worker-secret.sh" --config "${WRANGLER_CI_CONFIG}" --worker-name "${DEPLOY_WORKER_NAME}"

      - name: Reconcile legacy D1 columns
        working-directory: "worker"
        run: node "./scripts/reconcile-legacy-d1-columns.mjs" --config "${WRANGLER_CI_CONFIG}" --database "DB" --remote

      - name: Apply D1 migrations
        working-directory: "worker"
        run: npx wrangler --config "${WRANGLER_CI_CONFIG}" d1 migrations apply "DB" --remote

      - name: Deploy Worker (full-stack)
        working-directory: "worker"
        run: npx wrangler --config "${WRANGLER_CI_CONFIG}" deploy

  smoke-production:
    if: github.ref == 'refs/heads/main' && inputs.promote_to_production
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    env:
      DEPLOY_SMOKE_URL: ${{ vars.SMOKE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production smoke configuration
        run: |
          if [ -z "${DEPLOY_SMOKE_URL}" ]; then
            echo "Missing required GitHub environment variable: SMOKE_URL"
            exit 1
          fi

      - name: Run production smoke check
        working-directory: "worker"
        run: bash "./scripts/smoke-check.sh" "${DEPLOY_SMOKE_URL}" "production"
