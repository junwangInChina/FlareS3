name: Deploy Worker Only

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: deploy-worker-only-main
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            worker/package-lock.json
            frontend/package-lock.json

      - name: Validate deploy configuration
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing required GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing required GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install worker dependencies
        working-directory: "worker"
        run: npm ci

      - name: Install frontend dependencies
        working-directory: "frontend"
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Resolve deploy target from wrangler.full.toml
        working-directory: "worker"
        run: |
          DEPLOY_WORKER_NAME="$(awk -F'"' '/^name[[:space:]]*=/{print $2; exit}' "wrangler.full.toml")"
          DEPLOY_DATABASE_NAME="$(awk -F'"' '/^database_name[[:space:]]*=/{print $2; exit}' "wrangler.full.toml")"

          if [ -z "${DEPLOY_WORKER_NAME}" ]; then
            echo "Failed to resolve worker name from wrangler.full.toml"
            exit 1
          fi
          if [ -z "${DEPLOY_DATABASE_NAME}" ]; then
            echo "Failed to resolve D1 database name from wrangler.full.toml"
            exit 1
          fi

          echo "DEPLOY_WORKER_NAME=${DEPLOY_WORKER_NAME}" >> "${GITHUB_ENV}"
          echo "DEPLOY_DATABASE_NAME=${DEPLOY_DATABASE_NAME}" >> "${GITHUB_ENV}"

      - name: Prepare Wrangler CI config
        working-directory: "worker"
        run: |
          bash "./scripts/prepare-wrangler-ci-config.sh" \
            --base-config "wrangler.full.toml" \
            --output-config "wrangler.full.ci.toml" \
            --worker-name "${DEPLOY_WORKER_NAME}" \
            --database-name "${DEPLOY_DATABASE_NAME}"
          echo "WRANGLER_CI_CONFIG=wrangler.full.ci.toml" >> "${GITHUB_ENV}"

      - name: Verify R2_MASTER_KEY secret exists
        working-directory: "worker"
        run: bash "./scripts/verify-worker-secret.sh" --config "${WRANGLER_CI_CONFIG}" --worker-name "${DEPLOY_WORKER_NAME}"

      - name: Reconcile legacy D1 columns
        working-directory: "worker"
        run: node "./scripts/reconcile-legacy-d1-columns.mjs" --config "${WRANGLER_CI_CONFIG}" --database "DB" --remote

      - name: Apply D1 migrations
        working-directory: "worker"
        run: npx wrangler --config "${WRANGLER_CI_CONFIG}" d1 migrations apply "DB" --remote

      - name: Deploy Worker (full-stack)
        working-directory: "worker"
        run: npx wrangler --config "${WRANGLER_CI_CONFIG}" deploy
