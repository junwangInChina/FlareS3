name = "flares3-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
MAX_FILE_SIZE = "5368709120"
TOTAL_STORAGE = "10737418240"

[[d1_databases]]
binding = "DB"
database_name = "flares3-db"
database_id = "REPLACE_WITH_D1_ID"
migrations_dir = "migrations"

[triggers]
crons = ["0 * * * *"]
